<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Curbside POS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#3e2723">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="dark-mode">
    <nav class="bottom-nav">
        <button onclick="showView('dashboard')" class="nav-item">📊<span>Home</span></button>
        <button onclick="showView('pos')" class="nav-item">☕<span>POS</span></button>
        <button onclick="showView('inventory')" class="nav-item">📦<span>Stock</span></button>
        <button onclick="showView('products')" class="nav-item">📜<span>Menu</span></button>
        <button onclick="showView('settings')" class="nav-item">⚙️<span>Settings</span></button>
    </nav>

    <main id="main-content">
        <!-- Dashboard View -->
        <section id="view-dashboard" class="view">
            <header><h1>The Curbside Dashboard</h1></header>
            <div class="stats-grid">
                <div class="stat-card"><h3>Today's Sales</h3><p id="stat-sales">₱0.00</p></div>
                <div class="stat-card"><h3>Orders</h3><p id="stat-orders">0</p></div>
                <div class="stat-card"><h3>Profit</h3><p id="stat-profit">₱0.00</p></div>
            </div>
            <div class="chart-container">
                <h3>Low Stock Alerts</h3>
                <ul id="low-stock-list" class="alert-list"></ul>
            </div>
        </section>

        <!-- POS View -->
        <section id="view-pos" class="view" style="display:none;">
            <div class="pos-container">
                <div class="pos-menu">
                    <div id="category-bar" class="category-scroll"></div>
                    <div id="product-grid" class="product-grid"></div>
                </div>
                <div class="pos-cart">
                    <h3>Current Order</h3>
                    <div id="cart-items"></div>
                    <div class="cart-totals">
                        <p>Subtotal: <span id="cart-subtotal">₱0.00</span></p>
                        <p>Discount: <input type="number" id="cart-discount" value="0" onchange="updateCartTotals()"> %</p>
                        <h2 id="cart-total">Total: ₱0.00</h2>
                        <input type="number" id="cash-received" placeholder="Cash Received">
                        <button onclick="completeSale()" class="btn-checkout">Complete Sale</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Inventory View -->
        <section id="view-inventory" class="view" style="display:none;">
            <header>
                <h1>Ingredients</h1>
                <button onclick="openModal('modal-ingredient')" class="btn-add">+</button>
            </header>
            <div class="table-container">
                <table id="inventory-table">
                    <thead>
                        <tr><th>Name</th><th>Stock</th><th>Unit</th><th>Cost</th><th>Action</th></tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </section>

        <!-- Product Management View -->
        <section id="view-products" class="view" style="display:none;">
            <header>
                <h1>Menu Items</h1>
                <button onclick="openModal('modal-product')" class="btn-add">+</button>
            </header>
            <div id="menu-list" class="menu-list-admin"></div>
        </section>

        <!-- Settings View -->
        <section id="view-settings" class="view" style="display:none;">
            <h1>Settings</h1>
            <div class="settings-group">
                <button onclick="exportData()">📤 Backup Data (JSON)</button>
                <input type="file" id="importFile" hidden onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()">📥 Restore Data</button>
                <button onclick="exportSalesCSV()">📊 Export Sales (CSV)</button>
                <button onclick="toggleDarkMode()">🌓 Toggle Dark/Light Mode</button>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="modal-ingredient" class="modal">
        <div class="modal-content">
            <h3>Add Ingredient</h3>
            <input type="text" id="ing-name" placeholder="Name (e.g. Fresh Milk)">
            <input type="number" id="ing-price" placeholder="Purchase Price">
            <input type="number" id="ing-qty" placeholder="Purchase Quantity">
            <select id="ing-unit">
                <option value="g">Grams (g)</option>
                <option value="ml">Milliliters (ml)</option>
                <option value="pcs">Pieces (pcs)</option>
                <option value="shot">Shot</option>
            </select>
            <input type="number" id="ing-reorder" placeholder="Reorder Level">
            <div class="modal-btns">
                <button onclick="saveIngredient()" class="btn-save">Save</button>
                <button onclick="closeModal('modal-ingredient')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Modal for Recipes -->
    <div id="modal-recipe" class="modal">
        <div class="modal-content">
            <h3 id="recipe-title">Edit Recipe</h3>
            <div id="recipe-ingredients-list"></div>
            <hr>
            <select id="recipe-ing-select"></select>
            <input type="number" id="recipe-ing-qty" placeholder="Qty">
            <button onclick="addIngredientToRecipe()">Add Item</button>
            <div class="modal-btns">
                <button onclick="closeModal('modal-recipe')" class="btn-save">Done</button>
            </div>
        </div>
    </div>

    <div id="modal-product" class="modal">
        <div class="modal-content">
            <h3>Add Product</h3>
            <input type="text" id="prod-name" placeholder="Product Name">
            <input type="number" id="prod-price" placeholder="Selling Price">
            <select id="prod-category">
                <option>Coffee</option>
                <option>Non-Coffee</option>
                <option>Matcha</option>
                <option>Fruit Drinks</option>
                <option>Frappe</option>
                <option>Snacks</option>
            </select>
            <div class="modal-btns">
                <button onclick="saveProduct()" class="btn-save">Save</button>
                <button onclick="closeModal('modal-product')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
